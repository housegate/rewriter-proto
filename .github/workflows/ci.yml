name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make tools
      - run: make lint
      - name: breaking check (pull requests)
        if: github.event_name == 'pull_request'
        run: make breaking BREAKING_BASELINE=origin/main
      - name: breaking check (main pushes)
        if: github.event_name == 'push'
        run: make breaking BREAKING_BASELINE="${{ github.event.before }}"
      - name: generated code is current
        run: |
          make proto
          git diff --exit-code -- gen/
          test -z "$(git ls-files --others --exclude-standard -- gen/)"
      - run: make test

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  proto:
    name: ci check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make tools
      - name: verify (pull requests)
        if: github.event_name == 'pull_request'
        run: make verify VERIFY_BREAKING_BASELINE=origin/main
      - name: verify (main pushes)
        if: github.event_name == 'push'
        run: make verify VERIFY_BREAKING_BASELINE="${{ github.event.before }}"

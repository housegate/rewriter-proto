name: release

on:
  workflow_dispatch:
    inputs:
      major_release:
        description: Create v1.0.0 from a v0 release (v2+ needs a /vN migration)
        type: boolean
        default: false
        required: false

concurrency:
  group: release

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require main
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Releases must run from main, got $GITHUB_REF" >&2
            exit 1
          fi
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make tools
      - id: version
        name: Compute version
        env:
          MAJOR_RELEASE: ${{ inputs.major_release }}
        run: |
          version="v$(scripts/next-version.sh "$MAJOR_RELEASE")"
          if git rev-parse --verify --quiet "refs/tags/$version" >/dev/null; then
            echo "Tag already exists: $version" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "next release: $version"
      - name: Validate release
        run: |
          latest=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)
          make verify VERIFY_BREAKING_BASELINE="$latest"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "release $VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" \
            --verify-tag \
            --title "$VERSION" \
            --generate-notes
          release_url=$(gh release view "$VERSION" --json url --jq '.url')
          echo "Released [$VERSION]($release_url)" >> "$GITHUB_STEP_SUMMARY"
